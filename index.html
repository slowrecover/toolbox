<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自救工具箱 · 给高敏感人</title>
<style>
:root{
  --bg:#E9EDEA; --surface:#FFFFFF; --surface-soft:#F4F6F3;
  --ink:#2B3A35; --muted:#9AA8A1; --line:#DCE3DF;
  --accent:#4F9277; --accent-press:#447F68; --accent-soft:#E2EFE8;
  --radius:20px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans SC","Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--bg);color:var(--ink);font-family:var(--font);
  -webkit-font-smoothing:antialiased;line-height:1.55;
  min-height:100vh;display:flex;justify-content:center;
  padding:48px 22px 40px;
}
.wrap{width:100%;max-width:480px}

/* header */
.head{margin-bottom:34px}
.mark{display:flex;align-items:center;gap:9px;margin-bottom:18px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.mark span{font-size:.82rem;letter-spacing:.06em;color:var(--muted);font-weight:600}
h1{font-size:1.7rem;line-height:1.3;margin:0 0 10px;letter-spacing:.01em}
.tag{color:var(--muted);font-size:.95rem;margin:0}
.tag b{color:var(--accent);font-weight:600}

/* cards */
.cards{display:flex;flex-direction:column;gap:14px}
.card{
  display:block;text-decoration:none;color:inherit;
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:22px 22px;
  box-shadow:0 12px 34px -26px rgba(43,58,53,.55);
  transition:transform .14s ease, box-shadow .14s ease, border-color .14s;
}
a.card:hover{transform:translateY(-2px);box-shadow:0 18px 40px -24px rgba(43,58,53,.6);border-color:var(--accent)}
.card h2{font-size:1.16rem;margin:0 0 6px;display:flex;align-items:center;gap:9px}
.card p{color:var(--muted);font-size:.92rem;margin:0 0 16px;line-height:1.55}
.cta{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-weight:600;font-size:.92rem}
.cta .arrow{transition:transform .14s}
a.card:hover .cta .arrow{transform:translateX(3px)}

.card.soon{opacity:.78}
.pill{
  display:inline-block;font-size:.74rem;color:var(--muted);font-weight:600;
  background:var(--surface-soft);border:1px solid var(--line);
  border-radius:999px;padding:4px 11px;
}

.foot{margin-top:30px;text-align:center;color:var(--muted);font-size:.74rem;line-height:1.7}
.foot .priv{display:block;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">

  <header class="head">
    <div class="mark"><span class="dot"></span><span>自救工具箱</span></div>
    <h1>用行为科学,<br>帮高敏感的你,慢慢开始</h1>
    <p class="tag">一个个小工具,帮你在动不了的时候,<b>动一下</b>。</p>
  </header>

  <div class="cards">

    <a class="card" href="kanxiaoqi.html">
      <h2>砍小器</h2>
      <p>把大到动不了的事,砍成一分钟能做的一步。用行为科学,把"开始"变简单。</p>
      <span class="cta">开始用 <span class="arrow">→</span></span>
    </a>

    <div class="card soon">
      <h2>落地周表</h2>
      <p>每天一瓢水,看着小胜一格格累积。治"三分钟热度"——靠结构,不靠毅力。</p>
      <span class="pill">即将上线</span>
    </div>

    <div class="card soon">
      <h2>决策尺子</h2>
      <p>遇事就乱、起情绪时,一把随身的判断尺,问自己一句,就稳了。</p>
      <span class="pill">即将上线</span>
    </div>

  </div>

  <p class="foot">
    做给以前的我。
    <span class="priv">不上传、不联网——你写的东西,只留在你自己的设备里。</span>
  </p>

</div>
</body>
</html>
